<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01 Hero Section - AI 产品经理面试作品</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                        },
                        blue: {
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                        },
                        green: {
                            400: '#4ade80',
                            500: '#22c55e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .hero-background {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            background-image:
                linear-gradient(180deg, #0f172a 0%, #1e293b 100%),
                radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 100% 100%, 40px 40px;
        }
        .animate-float {
            animation: float 2s ease-in-out infinite;
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
    </style>
</head>
<body class="hero-background min-h-screen">
    <!-- Navigation (hidden initially, shown on scroll) -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur-sm border-b border-slate-700 transform -translate-y-full transition-transform duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="text-white font-bold text-xl">AI PM Portfolio</div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="#" class="text-slate-300 hover:text-white transition-colors">问题洞察</a>
                    <a href="#" class="text-slate-300 hover:text-white transition-colors">四个真问题</a>
                    <a href="#" class="text-slate-300 hover:text-white transition-colors">实战解法</a>
                    <a href="#" class="text-slate-300 hover:text-white transition-colors">结果数据</a>
                    <a href="#" class="text-slate-300 hover:text-white transition-colors">认知沉淀</a>
                    <a href="#" class="text-slate-300 hover:text-white transition-colors">能力映射</a>
                    <a href="#" class="text-slate-300 hover:text-white transition-colors">可迁移性</a>
                </div>
                <button class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg transition-colors">
                    下载简历
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Content -->
    <main class="min-h-screen flex flex-col items-center justify-center px-6 py-20">
        <!-- Tagline -->
        <div class="animate-fade-in-up">
            <span class="inline-block bg-blue-600 text-white text-sm font-medium px-4 py-1.5 rounded-full">
                AI 产品经理面试作品
            </span>
        </div>

        <!-- Main Title -->
        <h1 class="animate-fade-in-up delay-100 text-white text-4xl sm:text-5xl lg:text-6xl font-bold text-center mt-8 max-w-5xl">
            从辅助到替代，我都做了什么
        </h1>

        <!-- Subtitle -->
        <p class="animate-fade-in-up delay-200 text-slate-400 text-lg sm:text-xl text-center mt-6 max-w-3xl leading-relaxed">
            过去一年，我把企业 Agent 从"能聊天"变成了"能干活"
        </p>
        <p class="animate-fade-in-up delay-200 text-slate-400 text-lg sm:text-xl text-center mt-2 max-w-3xl leading-relaxed">
            不是接个 API，而是把企业改造成 AI 能稳定做事的环境
        </p>

        <!-- Metric Cards -->
        <div class="animate-fade-in-up delay-300 grid grid-cols-1 md:grid-cols-3 gap-6 mt-16 w-full max-w-4xl">
            <!-- Card 1: Accuracy -->
            <div class="group bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl p-8 hover:bg-white/15 hover:border-white/30 hover:transform hover:-translate-y-1 transition-all duration-300 cursor-pointer">
                <div class="text-green-400 text-5xl font-bold mb-2">40% → 90%+</div>
                <div class="text-slate-300 text-lg font-medium mb-2">准确率提升</div>
                <div class="text-slate-400 text-sm">核心场景 AI 产出准确率</div>
            </div>

            <!-- Card 2: Efficiency -->
            <div class="group bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl p-8 hover:bg-white/15 hover:border-white/30 hover:transform hover:-translate-y-1 transition-all duration-300 cursor-pointer">
                <div class="text-green-400 text-5xl font-bold mb-2">300%</div>
                <div class="text-slate-300 text-lg font-medium mb-2">人效提升</div>
                <div class="text-slate-400 text-sm">单人管理项目数从 2 个提升至 5-6 个</div>
            </div>

            <!-- Card 3: Automation -->
            <div class="group bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl p-8 hover:bg-white/15 hover:border-white/30 hover:transform hover:-translate-y-1 transition-all duration-300 cursor-pointer">
                <div class="text-green-400 text-5xl font-bold mb-2">6 层+</div>
                <div class="text-slate-300 text-lg font-medium mb-2">自动化节点</div>
                <div class="text-slate-400 text-sm">管理决策节点已由 AI 稳定自动处理</div>
            </div>
        </div>

        <!-- Scroll Indicator -->
        <div class="animate-float mt-20 flex flex-col items-center cursor-pointer" onclick="scrollToNext()">
            <svg class="w-6 h-6 text-slate-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
            </svg>
            <span class="text-slate-400 text-sm">向下滚动探索</span>
        </div>
    </main>

    <script>
        // Scroll indicator click
        function scrollToNext() {
            window.scrollTo({
                top: window.innerHeight,
                behavior: 'smooth'
            });
        }

        // Navbar show on scroll
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 100) {
                navbar.classList.remove('-translate-y-full');
            } else {
                navbar.classList.add('-translate-y-full');
            }
        });
    </script>
</body>
</html>
